name: fluidGo — Build & Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:          # allow manual trigger from GitHub UI
    inputs:
      skip_tests:
        description: 'Skip vertical slice tests (emergency deploy)'
        type: boolean
        default: false

env:
  REGISTRY:         ghcr.io
  BACKEND_IMAGE:    ghcr.io/${{ github.repository_owner }}/fluidgo-backend
  FRONTEND_IMAGE:   ghcr.io/${{ github.repository_owner }}/fluidgo-frontend
  APP_DIR:          /opt/fluidgo/app

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Backend tests (vertical slice smoke test)
  # ══════════════════════════════════════════════════════════════════════════
  test:
    name: Smoke Test
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       fluidgo_test
          POSTGRES_USER:     fluidgo
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run Alembic migrations (test DB)
        working-directory: ./backend
        env:
          DATABASE_URL:   postgresql+asyncpg://fluidgo:testpass@localhost:5432/fluidgo_test
          JWT_SECRET:     test-secret-not-for-production
          OLLAMA_URL:     http://localhost:11434   # won't be available — AI checks will skip
        run: alembic upgrade head

      - name: Verify backend imports OK
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://fluidgo:testpass@localhost:5432/fluidgo_test
          JWT_SECRET:   test-secret-not-for-production
        run: python -c "from app.main import app; print('Backend imports OK')"

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Build & push Docker images to GHCR
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    permissions:
      contents: read
      packages: write

    outputs:
      sha_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend ──────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          file:       ./backend/Dockerfile.prod
          push:       true
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          file:       ./frontend/Dockerfile.prod
          push:       true
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,mode=max,scope=frontend
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 3 — Deploy to EC2
  # ══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build]
    environment: production    # requires manual approval in GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SHA:            ${{ github.sha }}
          BACKEND_IMAGE:  ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          APP_DIR:        ${{ env.APP_DIR }}
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs:     SHA,BACKEND_IMAGE,FRONTEND_IMAGE,APP_DIR
          timeout:  300s
          script: |
            set -euo pipefail
            echo "▶ Deploying SHA: $SHA"

            cd "$APP_DIR"

            # Pull latest code (for compose file + nginx config)
            git fetch origin main
            git reset --hard origin/main

            # Log in to GHCR using the token from server env
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull new images
            docker pull "$BACKEND_IMAGE:$SHA"
            docker pull "$FRONTEND_IMAGE:$SHA"

            # Tag as latest locally
            docker tag "$BACKEND_IMAGE:$SHA" "$BACKEND_IMAGE:latest"
            docker tag "$FRONTEND_IMAGE:$SHA" "$FRONTEND_IMAGE:latest"

            # Rolling deploy — backend first, then frontend
            docker compose -f docker-compose.prod.yml up -d --no-build backend
            sleep 10

            # Verify backend health before continuing
            for i in $(seq 1 12); do
              if curl -sf http://127.0.0.1:8000/api/health > /dev/null; then
                echo "Backend healthy after ${i}×5s"
                break
              fi
              echo "Waiting for backend... ($i/12)"
              sleep 5
            done

            # Deploy frontend
            docker compose -f docker-compose.prod.yml up -d --no-build frontend

            # Full health check
            sleep 5
            HEALTH=$(curl -sf https://dsr.fluidpro.in/api/health || echo "FAIL")
            echo "Final health: $HEALTH"
            if echo "$HEALTH" | grep -q "ok"; then
              echo "✅ Deployment successful — SHA: $SHA"
            else
              echo "❌ Health check failed — rolling back..."
              docker compose -f docker-compose.prod.yml up -d --no-build
              exit 1
            fi

            # Prune old images (keep last 3)
            docker image prune -f --filter "label=org.opencontainers.image.source" || true

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ fluidGo deployed successfully — SHA: ${{ github.sha }}"
          else
            echo "❌ Deployment failed — check logs above"
          fi

# ══════════════════════════════════════════════════════════════════════════════
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   EC2_HOST      — Public IP or DNS of EC2 instance (e.g. 52.66.x.x)
#   EC2_USER      — SSH username (ubuntu)
#   EC2_SSH_KEY   — Private key content (-----BEGIN OPENSSH PRIVATE KEY-----)
#
# On the EC2 server, set these env vars in /etc/environment or ~/.bashrc:
#   GHCR_USER     — GitHub username
#   GHCR_TOKEN    — GitHub PAT with read:packages scope
#
# GitHub Environment "production" — set up at:
#   Repo → Settings → Environments → production → Add required reviewer
#   This forces a manual approval gate before every production deploy.
# ══════════════════════════════════════════════════════════════════════════════
