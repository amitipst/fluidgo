name: fluidGo Release Pipeline

# ══════════════════════════════════════════════════════════════════════════════
# TRIGGER STRATEGY
# ─────────────────────────────────────────────────────────────────────────────
# main branch  → UAT deploy (automatic on every merge)
# tag v*.*.*   → Production deploy (requires manual approval)
# PR to main   → Run full test suite only (no deploy)
# ══════════════════════════════════════════════════════════════════════════════
on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'uat'
        type: choice
        options: [uat, production]
      skip_smoke:
        description: 'Skip smoke tests (emergency only)'
        type: boolean
        default: false

env:
  REGISTRY:        ghcr.io
  BACKEND_IMAGE:   ghcr.io/${{ github.repository_owner }}/fluidgo-backend
  FRONTEND_IMAGE:  ghcr.io/${{ github.repository_owner }}/fluidgo-frontend
  APP_VERSION:     ${{ github.ref_type == 'tag' && github.ref_name || format('dev-{0}', github.sha) }}

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 — FULL TEST SUITE (runs on every PR and push)
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  test:
    name: 🧪 Full Test Suite
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_smoke }}

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       fluidgo_test
          POSTGRES_USER:     fluidgo
          POSTGRES_PASSWORD: ci_test_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s --health-timeout 5s --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Apply DB migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://fluidgo:ci_test_pass@localhost:5432/fluidgo_test
          JWT_SECRET:   ci-test-secret-not-for-production
          OLLAMA_URL:   http://localhost:11434
        run: alembic upgrade head

      - name: Seed test data
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://fluidgo:ci_test_pass@localhost:5432/fluidgo_test
          JWT_SECRET:   ci-test-secret-not-for-production
          OLLAMA_URL:   http://localhost:11434
        run: python seed_v3.py
        timeout-minutes: 5

      - name: Run vertical slice acceptance tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://fluidgo:ci_test_pass@localhost:5432/fluidgo_test
          JWT_SECRET:   ci-test-secret-not-for-production
          OLLAMA_URL:   http://localhost:11434
        run: |
          # Start FastAPI in background
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          SERVER_PID=$!
          # Wait for it to be ready
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Run the full vertical slice test
          python vertical_slice_test.py 2>&1 | tee test_results.txt
          # Fail if any FAIL lines appear
          if grep -q "❌ FAIL" test_results.txt; then
            echo "::error::Vertical slice tests FAILED"
            cat test_results.txt
            kill $SERVER_PID
            exit 1
          fi
          kill $SERVER_PID
          echo "✅ All tests passed"
        timeout-minutes: 15

      - name: TypeScript type check (frontend)
        working-directory: frontend
        run: |
          npm install --legacy-peer-deps --silent
          npx tsc --noEmit
        timeout-minutes: 5

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: backend/test_results.txt
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2 — BUILD & PUSH DOCKER IMAGES
  # Only runs after tests pass, and only for main/tag pushes (not PRs)
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      backend_digest:  ${{ steps.build-backend.outputs.digest }}
      frontend_digest: ${{ steps.build-frontend.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:v0.13.0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE }}
          tags: |
            # On tag push: v1.0.0-uat → image:v1.0.0-uat AND image:uat
            # On tag push: v1.0.0      → image:v1.0.0 AND image:latest
            # On main push: image:main-<sha>
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build & push backend
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context:    backend
          file:       backend/Dockerfile.prod
          push:       true
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
          labels:     ${{ steps.meta.outputs.labels }}

      - name: Build & push frontend
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context:    frontend
          file:       frontend/Dockerfile.prod
          push:       true
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,mode=max,scope=frontend
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
          labels:     ${{ steps.meta.outputs.labels }}

      - name: Generate image manifest (for audit trail)
        run: |
          echo "## Image Manifest — ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag | Digest |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | ${{ steps.meta.outputs.version }} | ${{ steps.build-backend.outputs.digest }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ steps.meta.outputs.version }} | ${{ steps.build-frontend.outputs.digest }} |" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 3 — DEPLOY TO UAT
  # Auto-deploys on every main branch push
  # ══════════════════════════════════════════════════════════════════════════
  deploy-uat:
    name: 🚀 Deploy → UAT
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || inputs.target == 'uat')
    environment:
      name: uat
      url: https://uat.dsr.fluidpro.in

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to UAT via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SHA:           ${{ github.sha }}
          VERSION:       ${{ needs.build.outputs.image_tag }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
        with:
          host:     ${{ secrets.UAT_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs:     SHA,VERSION,BACKEND_IMAGE,FRONTEND_IMAGE
          timeout:  300s
          script: |
            set -euo pipefail
            cd /opt/fluidgo/app
            git fetch origin main && git reset --hard origin/main
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            docker pull "${BACKEND_IMAGE}:${SHA}"
            docker pull "${FRONTEND_IMAGE}:${SHA}"
            docker tag "${BACKEND_IMAGE}:${SHA}" "${BACKEND_IMAGE}:uat"
            docker tag "${FRONTEND_IMAGE}:${SHA}" "${FRONTEND_IMAGE}:uat"
            docker compose -f docker-compose.prod.yml up -d --no-build backend
            sleep 15
            curl -sf http://127.0.0.1:8000/api/health | grep -q "ok"
            docker compose -f docker-compose.prod.yml up -d --no-build frontend
            sleep 5
            echo "✅ UAT deploy complete — version ${VERSION} (${SHA:0:8})"

      - name: Post-deploy smoke test (UAT)
        run: |
          sleep 10
          HEALTH=$(curl -sf https://uat.dsr.fluidpro.in/api/health || echo "FAIL")
          if echo "$HEALTH" | grep -q "ok"; then
            echo "✅ UAT health check passed"
          else
            echo "❌ UAT health check FAILED: $HEALTH"
            exit 1
          fi

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 4 — DEPLOY TO PRODUCTION
  # Only runs on version tag push (v*.*.*)
  # REQUIRES manual approval via GitHub Environment protection rules
  # ══════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: 🏭 Deploy → Production
    runs-on: ubuntu-latest
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      inputs.target == 'production'
    environment:
      name: production
      url: https://dsr.fluidpro.in

    steps:
      - uses: actions/checkout@v4

      - name: Production pre-flight checklist
        run: |
          echo "## Production Deploy — ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests passed | ✅ (job: test) |" >> $GITHUB_STEP_SUMMARY
          echo "| Images built | ✅ (job: build) |" >> $GITHUB_STEP_SUMMARY
          echo "| Manual approval | ✅ (environment gate) |" >> $GITHUB_STEP_SUMMARY
          echo "| Version tag | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY

      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SHA:            ${{ github.sha }}
          VERSION:        ${{ github.ref_name }}
          BACKEND_IMAGE:  ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs:     SHA,VERSION,BACKEND_IMAGE,FRONTEND_IMAGE
          timeout:  300s
          script: |
            set -euo pipefail
            cd /opt/fluidgo/app
            git fetch --tags && git checkout "$VERSION"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            # Pull images
            docker pull "${BACKEND_IMAGE}:${SHA}"
            docker pull "${FRONTEND_IMAGE}:${SHA}"
            docker tag "${BACKEND_IMAGE}:${SHA}" "${BACKEND_IMAGE}:latest"
            docker tag "${BACKEND_IMAGE}:${SHA}" "${BACKEND_IMAGE}:${VERSION}"
            docker tag "${FRONTEND_IMAGE}:${SHA}" "${FRONTEND_IMAGE}:latest"
            docker tag "${FRONTEND_IMAGE}:${SHA}" "${FRONTEND_IMAGE}:${VERSION}"

            # DB backup before deploy
            /opt/fluidgo/backup.sh
            echo "DB backup complete"

            # Rolling deploy
            docker compose -f docker-compose.prod.yml up -d --no-build backend
            sleep 15
            for i in $(seq 1 12); do
              if curl -sf http://127.0.0.1:8000/api/health | grep -q "ok"; then
                echo "Backend healthy (${i}x5s)"
                break
              fi
              echo "Waiting for backend... $i/12"
              sleep 5
            done

            docker compose -f docker-compose.prod.yml up -d --no-build frontend
            sleep 5

            # Final health check
            HEALTH=$(curl -sf http://127.0.0.1:8000/api/health || echo "FAIL")
            if echo "$HEALTH" | grep -q "ok"; then
              echo "✅ Production deploy successful — ${VERSION}"
              # Record deployment
              echo "${VERSION} deployed at $(date -u)" >> /opt/fluidgo/deployments.log
            else
              echo "❌ Health check failed — rolling back to previous"
              docker compose -f docker-compose.prod.yml up -d --no-build
              exit 1
            fi

            # Prune old images
            docker image prune -f --filter "until=168h" || true

      - name: Production smoke test
        run: |
          sleep 15
          for endpoint in \
            "https://dsr.fluidpro.in/api/health" \
            "https://dsr.fluidpro.in/api/auth/login"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$endpoint" || echo "000")
            echo "$endpoint → HTTP $STATUS"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          generate_release_notes: true
          body: |
            ## fluidGo ${{ github.ref_name }}

            **Deploy:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            **Backend image:** `${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}`
            **Frontend image:** `${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}`

            ### ✅ Pre-release checklist
            - [x] All 75 vertical slice tests passing
            - [x] TypeScript compilation clean
            - [x] Production Docker images built
            - [x] Manual approval gate passed
            - [x] DB backup taken before deploy
            - [x] Post-deploy health check confirmed

# ══════════════════════════════════════════════════════════════════════════════
# REQUIRED GITHUB CONFIGURATION
# ──────────────────────────────────────────────────────────────────────────────
# Secrets (Settings → Secrets → Actions):
#   UAT_HOST    — UAT EC2 public IP or hostname
#   PROD_HOST   — Production EC2 public IP or hostname
#   EC2_USER    — SSH user (ubuntu)
#   EC2_SSH_KEY — Private key (-----BEGIN OPENSSH PRIVATE KEY-----)
#   GHCR_USER   — GitHub username (for docker login on EC2)
#   GHCR_TOKEN  — GitHub PAT with read:packages (for docker login on EC2)
#
# Environments (Settings → Environments):
#   uat:
#     No protection rules (auto-deploy on merge to main)
#     URL: https://uat.dsr.fluidpro.in
#   production:
#     Required reviewers: [amit@wepsol.com]  ← add yourself
#     Wait timer: 0 minutes
#     URL: https://dsr.fluidpro.in
# ══════════════════════════════════════════════════════════════════════════════
