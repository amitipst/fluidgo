# Production nginx — SSL termination, security headers, gzip
# Place at: /etc/nginx/conf.d/fluidgo.conf on EC2

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name DSR_DOMAIN_PLACEHOLDER;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name DSR_DOMAIN_PLACEHOLDER;

    # ── SSL (Let's Encrypt via certbot) ─────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/DSR_DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DSR_DOMAIN_PLACEHOLDER/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self';" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/wasm font/woff2;

    # ── API — FastAPI backend ─────────────────────────────────────────────────
    location /api/auth/login {
        # Stricter rate limit on login
        limit_req zone=login burst=3 nodelay;
        proxy_pass         http://127.0.0.1:8000/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # AI streaming — no buffering
        location /api/ai/analyse/stream {
            proxy_pass         http://127.0.0.1:8000/api/ai/analyse/stream;
            proxy_buffering    off;
            proxy_read_timeout 300s;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── Frontend — built React SPA (nginx container) ──────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;

        # Long cache for hashed assets
        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            proxy_pass http://127.0.0.1:3000;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Let's Encrypt ACME challenge ──────────────────────────────────────────
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Health check (for AWS ALB/monitoring) ────────────────────────────────
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Block common exploit paths
    location ~* \.(php|asp|aspx|jsp|cgi)$ { return 444; }
    location ~* /\. { return 444; }
}
