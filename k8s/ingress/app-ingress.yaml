# Prereqs (run once per cluster, not part of this manifest — see README/WEP-33):
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.0/cert-manager.yaml
# Then point DNS (e.g. dsr.fluidpro.in) at the EC2 public IP before applying this file, so the
# HTTP-01 challenge below can resolve.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fluidgo-ingress
  namespace: fluidgo
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"   # streaming AI responses
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [dsr.fluidpro.in]
      secretName: fluidgo-tls
  rules:
    - host: dsr.fluidpro.in
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
