# docker-compose.prod.yml — Production deployment on EC2
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires: .env file (copy from .env.prod — see setup-ec2.sh)
# DO NOT use docker-compose.yml (dev) on the server.

# Top-level env_file — loads .env.prod for ALL services and variable substitution
# This ensures DB_PASSWORD is available for the db service's POSTGRES_PASSWORD
x-env: &env
  env_file:
    - path: .env.prod
      required: true

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: always
    <<: *env
    environment:
      POSTGRES_DB:       fluidgo
      POSTGRES_USER:     fluidgo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - /opt/fluidgo/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluidgo"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Ollama (local LLM) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 5g

  # Pull model on first run
  ollama-init:
    image: curlimages/curl:latest
    <<: *env
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        echo "Pulling ${OLLAMA_MODEL:-phi3:mini}..."
        curl -s -X POST http://ollama:11434/api/pull \
          -d "{\"name\":\"${OLLAMA_MODEL:-phi3:mini}\",\"stream\":false}" \
          && echo "Model ready"

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    <<: *env
    environment:
      DATABASE_URL: postgresql+asyncpg://fluidgo:${DB_PASSWORD}@db:5432/fluidgo
      OLLAMA_URL:   http://ollama:11434
      ENVIRONMENT:  production
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend (built React SPA) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "127.0.0.1:3000:80"
    deploy:
      resources:
        limits:
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/fluidgo/pgdata
  ollama_models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/fluidgo/ollama
